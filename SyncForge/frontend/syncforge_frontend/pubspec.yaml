name: syncforge_frontend
description: SyncForge Flutter Client
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  file_picker: ^8.0.0
  path: ^1.9.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  http_parser: ^4.0.2
  provider: ^6.1.2
  web_socket_channel: ^2.4.0
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  stomp_dart_client: ^3.0.1
  timeago: ^3.7.1
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  flutter_launcher_icons: ^0.13.1 


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/syncforge_logo.png"
  min_sdk_android: 21 

flutter:
  uses-material-design: true
  assets:
   - assets/images/syncforge_logo.png