<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance Dashboard</title>

<link rel="stylesheet" href="/static/css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<h2>
<i class="fa-solid fa-chart-column"></i>
Attendance Dashboard
</h2>

</div>


<div class="container">

<!-- STATS -->

<div class="stats-grid">

<div class="stat-card">

<h3>Total Students</h3>

<p id="studentCount">1</p>

</div>

<div class="stat-card">

<h3>Average Attendance</h3>

<p id="avgAttendance">0%</p>

</div>

<div class="stat-card">

<h3>Highest Attendance</h3>

<p id="highestAttendance">0%</p>

</div>

<div class="stat-card">

<h3>Lowest Attendance</h3>

<p id="lowestAttendance">0%</p>

</div>

</div>


<form action="/generate" method="POST">

<!-- INPUTS -->

<div class="top-grid">

<input
type="text"
name="college"
placeholder="🏫 College Name"
required>

<input
type="text"
name="class"
placeholder="📚 Class / Semester"
required>

<input
type="text"
name="subject"
placeholder="📖 Subject"
required>

<input
type="number"
name="total_classes"
id="totalClasses"
placeholder="📊 Total Classes"
oninput="updateAll()"
required>

</div>

<br>

<!-- SEARCH -->

<input
type="text"
id="searchStudent"
placeholder="🔍 Search Student"
onkeyup="searchStudent()">


<!-- TABLE -->

<table id="studentTable">

<thead>

<tr>

<th>#</th>

<th>Name</th>

<th>Attended</th>

<th>Percentage</th>

<th>Clear</th>

</tr>

</thead>

<tbody>

<tr>

<td class="serial">1</td>

<td>

<input
name="name[]"
required>

</td>

<td>

<input
name="attended[]"
type="number"
min="0"
oninput="calculate(this)"
required>

</td>

<td>

<span class="percent">

0%

</span>

</td>

<td>

<button
type="button"
class="delete-btn"
onclick="deleteRow(this)">

<i class="fa-solid fa-xmark"></i>

</button>

</td>

</tr>

</tbody>

</table>


<div class="btn-group">

<button
type="button"
onclick="addRow()">

<i class="fa-solid fa-user-plus"></i>

Add Student

</button>


<button
type="submit"
class="generate-btn">

<i class="fa-solid fa-file-pdf"></i>

Generate PDF

</button>

</div>

</form>

</div>

<script src="/static/js/app.js"></script>

</body>

</html>
