services:
  - type: web
    name: bloodconnect-api
    runtime: node
    plan: free
    autoDeploy: true
    # Root directory is the repo root (server/index.js is the entry point)
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # ── Required ──────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      - key: PORT
        value: "5000"

      # MongoDB Atlas connection string (set in Render dashboard)
      - key: MONGODB_URI
        sync: false

      # JWT — auto-generate a secure random secret on first deploy
      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRE
        value: 7d

      # ── Frontend URL (CORS) ───────────────────────────────────────────────────
      # Set these to your Vercel frontend URL after deploying (e.g. https://my-app.vercel.app)
      # CLIENT_URLS supports comma-separated list for multiple preview/production URLs
      - key: CLIENT_URL
        sync: false

      - key: CLIENT_URLS
        sync: false

      # ── Email (Optional — for password reset & notifications) ─────────────────
      - key: SMTP_HOST
        sync: false

      - key: SMTP_PORT
        value: "587"

      - key: SMTP_USER
        sync: false

      - key: SMTP_PASS
        sync: false

      # ── SMS via Twilio (Optional) ─────────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false

      - key: TWILIO_AUTH_TOKEN
        sync: false

      - key: TWILIO_PHONE_NUMBER
        sync: false

      # ── Maps (Optional) ───────────────────────────────────────────────────────
      - key: MAPBOX_ACCESS_TOKEN
        sync: false

      # ── File Upload ───────────────────────────────────────────────────────────
      # NOTE: Render free tier has an ephemeral file system.
      # Files uploaded to ./uploads will be lost on every redeploy/restart.
      # For persistent file storage, use Cloudinary or AWS S3.
      - key: MAX_FILE_SIZE
        value: "5242880"

      - key: UPLOAD_PATH
        value: ./uploads
